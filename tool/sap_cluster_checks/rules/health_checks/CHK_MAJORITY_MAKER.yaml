# CHK_MAJORITY_MAKER - Validate majority maker configuration for Scale-Out clusters
check_id: CHK_MAJORITY_MAKER
version: "2.0"
severity: CRITICAL
description: Validate majority maker configuration for Scale-Out clusters
enabled: true
topology_filter: [Scale-Out]  # Only Scale-Out clusters have majority makers

# Scale-Out configuration:
# - 2+ HANA nodes per site (4+ total HANA nodes)
# - 1 majority maker (tie-breaker) node
#
# Majority maker requirements:
# - Should NOT have sap-hana-ha or resource-agents-sap-hana-scaleout installed
# - If packages ARE installed, must have:
#   1. Location constraints preventing SAP HANA resources on majority maker
#   2. resource-discovery=never to avoid orphaned resource messages

source_definitions:
  live_cmd: |
    echo "=== CLUSTER_NODES ==="
    crm_node -l 2>/dev/null || pcs status nodes 2>/dev/null
    echo "=== MAJORITY_MAKER ==="
    # Detect by name pattern
    MM_BY_NAME=$(crm_node -l 2>/dev/null | grep -iE 'majority|mm-' | awk '{print $2}');
    # Detect by location constraint (node excluded from SAPHana resources)
    MM_BY_CONSTRAINT=$(pcs constraint location show 2>/dev/null | grep -E "SAPHana.*avoids node.*INFINITY|SAPHanaController.*avoids node.*INFINITY" | sed "s/.*avoids node '\\([^']*\\)'.*/\\1/" | sort -u | head -1);
    if [ -n "$MM_BY_NAME" ]; then
      echo "majority_maker_node=$MM_BY_NAME";
      echo "detection_method=name_pattern";
    elif [ -n "$MM_BY_CONSTRAINT" ]; then
      echo "majority_maker_node=$MM_BY_CONSTRAINT";
      echo "detection_method=location_constraint";
    else
      echo "none";
    fi
    echo "=== HANA_PACKAGES ==="
    rpm -qa 2>/dev/null | grep -E 'sap-hana-ha|resource-agents-sap-hana' || echo "none"
    echo "=== LOCATION_CONSTRAINTS ==="
    pcs constraint location show 2>/dev/null | grep -iE 'SAPHana|Controller' || echo "none"
    echo "=== RESOURCE_DISCOVERY ==="
    pcs constraint location show --full 2>/dev/null | grep -i 'resource-discovery' || echo "none"
  sos_path: "sos_commands/pacemaker/pcs_config"
  # Fallback: run pcs -f cib.xml locally when cluster was stopped
  sos_cmd: "pcs -f {file} constraint location show --full 2>/dev/null"
  sos_cmd_file: "sos_commands/pacemaker/crm_report/*/cib.xml"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: majority_maker_node
      # Captures "majority_maker_node=<hostname>" from detection output
      regex: "majority_maker_node=(\\S+)"
      group: 1
    - name: detection_method
      regex: "detection_method=(\\S+)"
      group: 1
    - name: has_sap_hana_ha
      regex: "(sap-hana-ha-[\\d\\.-]+)"
      group: 1
    - name: has_resource_agents_scaleout
      regex: "(resource-agents-sap-hana-scaleout-[\\d\\.-]+)"
      group: 1
    - name: location_constraint
      regex: "(avoids node.*INFINITY|location.*SAPHana.*-INFINITY|Disabled on:.*|score:-INFINITY.*SAPHana)"
      group: 0
    - name: resource_discovery_never
      regex: "(resource-discovery=never|resource-discovery:.*never)"
      group: 0

validation_logic:
  scope: cluster  # Majority maker config is cluster-wide
  match_mode: any  # At least one check should pass
  expectations:
    # Ideal: majority maker has no SAP HANA packages
    - key: has_sap_hana_ha
      operator: not_exists
      value: true
      message: "Majority maker has sap-hana-ha package - verify location constraints prevent HANA resources"
    - key: has_resource_agents_scaleout
      operator: not_exists
      value: true
      message: "Majority maker has resource-agents-sap-hana-scaleout - verify location constraints prevent HANA resources"
