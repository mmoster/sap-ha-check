# CHK_RESOURCE_FAILURES - Detect failed resource operations
check_id: CHK_RESOURCE_FAILURES
version: "1.1"
severity: WARNING
description: Detect failed resource operations in cluster history
enabled: true

# Checks crm_mon output for failed resource actions.
# In crm_mon output, failures are explicitly shown (FAILED, fail-count, Failed Actions).
# If none of these patterns appear, the cluster has no resource failures.

source_definitions:
  live_cmd: |
    crm_mon -1 -f 2>/dev/null || pcs status --full 2>/dev/null
  sos_path: "sos_commands/pacemaker/crm_mon_-1*"
  # Fallback: run pcs -f cib.xml locally when cluster was stopped
  sos_cmd: "pcs -f {file} status --full 2>/dev/null"
  sos_cmd_file: "sos_commands/pacemaker/crm_report/*/cib.xml"

parser:
  type: regex
  multiline: true
  search_patterns:
    # Detect actual failure indicators in crm_mon/pcs output
    - name: failures_found
      regex: "(FAILED|fail-count=[1-9]|Failed Actions)"
      group: 0

validation_logic:
  scope: cluster  # Failure history is cluster-wide
  expectations:
    - key: failures_found
      operator: not_exists
      value: true
      message: "Failed resource actions detected - may need cleanup with: pcs resource cleanup"
