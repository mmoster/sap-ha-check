# CHK_ALERT_FENCING - Validate SAPHanaSR-alert-fencing
check_id: CHK_ALERT_FENCING
version: "1.0"
severity: WARNING
description: Validate SAPHanaSR alert and fencing configuration
enabled: true
optional: true  # Alerts optional in non-strict mode

source_definitions:
  # Check for alert and fencing configuration using pcs (RHEL)
  live_cmd: |
    echo "=== ALERTS ==="
    pcs alert config 2>/dev/null || echo "NO_ALERTS"
    echo "=== FENCING ==="
    pcs stonith status 2>/dev/null
    pcs stonith config 2>/dev/null | head -20
  sos_path: "sos_commands/pacemaker/pcs_config"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: alert_config
      regex: "(Alerts:|alert|SAPHanaSR-alert)"
      group: 0
    - name: fence_config
      regex: "(stonith|fence_|fencing-topology|Started)"
      group: 0
    - name: no_alerts
      regex: "NO_ALERTS"
      group: 0

validation_logic:
  scope: cluster  # Alert config is cluster-wide
  expectations: []
  # Informational - alerts are optional but recommended for SAP HANA clusters
