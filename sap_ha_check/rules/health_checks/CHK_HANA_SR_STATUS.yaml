# CHK_HANA_SR_STATUS - Verify HANA System Replication status
check_id: CHK_HANA_SR_STATUS
version: "1.1"
severity: CRITICAL
description: Verify HANA System Replication status is healthy
enabled: true
requires: CHK_RESOURCE_STATUS  # Skip if HANA resource is not running

source_definitions:
  # Support both old (Masters/Slaves) and new (Promoted/Unpromoted) terminology
  live_cmd: "pcs status 2>/dev/null | grep -iE 'SAPHana|Masters|Slaves|Promoted|Unpromoted|Started' || crm_mon -1 2>/dev/null | grep -iE 'SAPHana|Masters|Slaves|Promoted|Unpromoted'"
  sos_path: "sos_commands/pacemaker/crm_mon_-1"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: hana_master
      # Match: "Masters: [ node ]" or "Promoted: [ node ]"
      regex: "(Masters|Promoted):\\s*\\[\\s*(\\w+)"
      group: 0
    - name: hana_slave
      # Match: "Slaves: [ node ]" or "Unpromoted: [ node ]"
      regex: "(Slaves|Unpromoted):\\s*\\[\\s*(\\w+)"
      group: 0
    - name: hana_started
      regex: "SAPHana.*Started"
      group: 0
    - name: sr_error
      regex: "(SFAIL|Failed|UNKNOWN)"
      group: 0

validation_logic:
  scope: cluster  # SR status is cluster-wide
  expectations:
    - key: sr_error
      operator: not_exists
      value: true
      message: "HANA System Replication reports errors"
    - key: hana_master
      operator: exists
      value: true
      message: "No HANA master found - System Replication may not be active"
