# CHK_MASTER_SLAVE_ROLES - Verify master/slave role consistency
check_id: CHK_MASTER_SLAVE_ROLES
version: "1.1"
severity: CRITICAL
description: Verify exactly one master and one slave in HANA cluster
enabled: true
requires: CHK_RESOURCE_STATUS  # Skip if HANA resource is not running

source_definitions:
  live_cmd: "crm_mon -1 2>/dev/null | grep -E 'Master|Slave|Promoted|Unpromoted' || SAPHanaSR-showAttr 2>/dev/null | grep -E 'roles|master'"
  sos_path: "sos_commands/pacemaker/crm_mon_-1*"
  # Fallback: run pcs -f cib.xml locally when cluster was stopped
  sos_cmd: "pcs -f {file} status 2>/dev/null | grep -E 'Master|Slave|Promoted|Unpromoted'"
  sos_cmd_file: "sos_commands/pacemaker/crm_report/*/cib.xml"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: master_count
      # Match: "Masters: [ node ]", "Promoted: [ node ]", "Promoted node", "PROMOTED"
      regex: "(Masters:\\s*\\[|Promoted:\\s*\\[|Promoted\\s+\\S|PROMOTED)"
      group: 0
    - name: slave_count
      # Match: "Slaves: [ node ]", "Unpromoted: [ node ]", "Unpromoted node", "DEMOTED"
      regex: "(Slaves:\\s*\\[|Unpromoted:\\s*\\[|Unpromoted\\s+\\S|DEMOTED)"
      group: 0
    - name: no_role
      regex: "(Stopped|no role|unknown)"
      group: 0

validation_logic:
  scope: cluster  # Role distribution is cluster-wide
  expectations:
    - key: master_count
      operator: exists
      value: true
      message: "No master/promoted instance found"
    - key: slave_count
      operator: exists
      value: true
      message: "No slave/unpromoted instance found - no failover target"
