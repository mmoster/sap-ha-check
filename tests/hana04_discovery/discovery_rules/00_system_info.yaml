# Discovery Rules: System Information
# Group: system_info
# These rules collect basic system information

group: system_info
description: Basic system and OS information
enabled: true

discoveries:
  - id: DISC_HOSTNAME
    description: Determine hostname and FQDN
    live_cmd: "hostname -f"
    parser:
      type: raw
    store_as: hostname

  - id: DISC_OS_RELEASE
    description: Operating system version
    live_cmd: "cat /etc/os-release"
    parser:
      type: key_value
      delimiter: "="
      strip_quotes: true
    store_as: os_info
    extract:
      - NAME
      - VERSION_ID
      - ID

  - id: DISC_KERNEL
    description: Kernel version
    live_cmd: "uname -r"
    parser:
      type: raw
    store_as: kernel_version

  - id: DISC_UPTIME
    description: System uptime
    live_cmd: "uptime -p"
    parser:
      type: raw
    store_as: uptime

  - id: DISC_ARCH
    description: System architecture
    live_cmd: "uname -m"
    parser:
      type: raw
    store_as: architecture
