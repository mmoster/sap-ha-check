# Discovery Rules: Network Configuration
# Group: network
# These rules collect network-related information

group: network
description: Network and communication configuration
enabled: true

discoveries:
  - id: DISC_COROSYNC_RINGS
    description: Corosync rings/links
    live_cmd: "corosync-cfgtool -s 2>/dev/null"
    parser:
      type: raw
    store_as: corosync_rings

  - id: DISC_COROSYNC_TRANSPORT
    description: Corosync transport configuration
    live_cmd: "grep -E '(transport|interface|bindnetaddr|mcastaddr)' /etc/corosync/corosync.conf 2>/dev/null"
    parser:
      type: lines
    store_as: corosync_transport

  - id: DISC_IP_ADDRESSES
    description: System IP addresses
    live_cmd: "ip -4 addr show | grep inet | awk '{print $2, $NF}'"
    parser:
      type: lines
    store_as: ip_addresses

  - id: DISC_VIRTUAL_IPS
    description: Virtual IPs from cluster
    live_cmd: "crm_resource -L 2>/dev/null | grep -iE '(IPaddr|ip)' || pcs resource show | grep -i ip 2>/dev/null"
    parser:
      type: lines
    store_as: virtual_ips

  - id: DISC_HOSTS_FILE
    description: /etc/hosts entries
    live_cmd: "grep -vE '^#|^$' /etc/hosts"
    parser:
      type: lines
    store_as: hosts_entries

  - id: DISC_FIREWALL_STATUS
    description: Firewall status
    live_cmd: "systemctl is-active firewalld 2>/dev/null || systemctl is-active iptables 2>/dev/null || echo 'unknown'"
    parser:
      type: raw
    store_as: firewall_status
