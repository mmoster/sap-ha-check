# CHK_SITE_ROLES - Verify site roles consistency
check_id: CHK_SITE_ROLES
version: "1.0"
severity: CRITICAL
description: Verify site roles are consistent (one primary, one secondary)
enabled: true

source_definitions:
  live_cmd: "pcs status 2>/dev/null | grep -iE 'Masters|Slaves|SAPHana' || crm_mon -1 2>/dev/null | grep -iE 'Masters|Slaves|SAPHana'"
  sos_path: "sos_commands/pacemaker/crm_mon_-1"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: master_node
      regex: "Masters:\\s*\\[\\s*(\\w+)"
      group: 0
    - name: slave_node
      regex: "Slaves:\\s*\\[\\s*(\\w+)"
      group: 0
    - name: saphana_resource
      regex: "SAPHana"
      group: 0

validation_logic:
  scope: cluster  # Site roles are cluster-wide
  expectations:
    - key: master_node
      operator: exists
      value: true
      message: "No master/primary node detected"
    - key: slave_node
      operator: exists
      value: true
      message: "No slave/secondary node detected - no failover target"
