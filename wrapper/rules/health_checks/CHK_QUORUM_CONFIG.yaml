# CHK_QUORUM_CONFIG - Validate quorum configuration
check_id: CHK_QUORUM_CONFIG
version: "1.0"
severity: CRITICAL
description: Validate quorum configuration for 2-node cluster
enabled: true

source_definitions:
  live_cmd: "cat /etc/corosync/corosync.conf 2>/dev/null | grep -E 'two_node|wait_for_all|expected_votes|quorum' || corosync-quorumtool -s 2>/dev/null | head -10"
  sos_path: "etc/corosync/corosync.conf"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: two_node
      regex: "two_node:\\s*1"
      group: 0
    - name: wait_for_all
      regex: "wait_for_all:\\s*[01]"
      group: 0
    - name: expected_votes
      regex: "(expected_votes|Expected votes)[:\\s]+\\d+"
      group: 0
    - name: quorum_section
      regex: "quorum\\s*\\{"
      group: 0

validation_logic:
  scope: all_nodes_equal  # Config should be same on all nodes
  compare_keys:
    - two_node
    - expected_votes
  expectations:
    - key: quorum_section
      operator: exists
      value: true
      message: "No quorum section found in corosync.conf"
