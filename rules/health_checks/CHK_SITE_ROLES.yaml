# CHK_SITE_ROLES - Verify site roles consistency
check_id: CHK_SITE_ROLES
version: "1.1"
severity: CRITICAL
description: Verify site roles are consistent (one primary, one secondary)
enabled: true
requires: CHK_RESOURCE_STATUS  # Skip if HANA resource is not running

source_definitions:
  # Support both old (Masters/Slaves) and new (Promoted/Unpromoted) terminology
  live_cmd: "pcs status 2>/dev/null | grep -iE 'Masters|Slaves|Promoted|Unpromoted|SAPHana' || crm_mon -1 2>/dev/null | grep -iE 'Masters|Slaves|Promoted|Unpromoted|SAPHana'"
  sos_path: "sos_commands/pacemaker/crm_mon_-1"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: master_node
      # Match: "Masters: [ node ]" or "Promoted: [ node ]"
      regex: "(Masters|Promoted):\\s*\\[\\s*(\\w+)"
      group: 0
    - name: slave_node
      # Match: "Slaves: [ node ]" or "Unpromoted: [ node ]"
      regex: "(Slaves|Unpromoted):\\s*\\[\\s*(\\w+)"
      group: 0
    - name: saphana_resource
      regex: "SAPHana"
      group: 0

validation_logic:
  scope: cluster  # Site roles are cluster-wide
  expectations:
    - key: master_node
      operator: exists
      value: true
      message: "No master/primary node detected"
    - key: slave_node
      operator: exists
      value: true
      message: "No slave/secondary node detected - no failover target"
