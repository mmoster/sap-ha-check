# CHK_CIB_TIME_SYNC - Verify CIB updates are synchronized
check_id: CHK_CIB_TIME_SYNC
version: "1.0"
severity: WARNING
description: Verify CIB (Cluster Information Base) is synchronized across nodes
enabled: true

source_definitions:
  live_cmd: "crm_mon -1 2>/dev/null | head -20"
  sos_path: "sos_commands/pacemaker/crm_mon_-1"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: cib_epoch
      regex: "epoch=\"(\\d+)\""
      group: 1
    - name: dc_present
      regex: "(Current DC|Designated Controller)"
      group: 0

validation_logic:
  scope: cluster  # CIB status is cluster-wide
  expectations:
    - key: dc_present
      operator: exists
      value: true
      message: "No Designated Controller (DC) - cluster may have communication issues"
