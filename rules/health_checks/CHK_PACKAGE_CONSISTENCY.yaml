# CHK_PACKAGE_CONSISTENCY - Verify package versions across nodes
check_id: CHK_PACKAGE_CONSISTENCY
version: "1.3"
severity: WARNING
description: Verify package versions are consistent across nodes
enabled: true
hana_nodes_only: true  # Only compare HANA nodes; nodes excluded by constraints may have different packages

# Package types (RHEL):
# - sap-hana-ha: Modern ANGI package (RHEL 9+), supports both Scale-Up and Scale-Out
# - resource-agents-sap-hana: Classic Scale-Up package (RHEL 8/9)
# - resource-agents-sap-hana-scaleout: Classic Scale-Out package (RHEL 8/9)
#
# Nodes excluded from HANA by location constraints (app servers in Scale-Up,
# majority makers in Scale-Out) are skipped - they may legitimately have
# different packages. Only HANA nodes are compared for consistency.

source_definitions:
  live_cmd: "rpm -q pacemaker corosync resource-agents-sap-hana resource-agents-sap-hana-scaleout sap-hana-ha SAPHanaSR 2>/dev/null | grep -v 'not installed' | sort; true"
  sos_path: "sos_commands/rpm/package-data"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: pacemaker_version
      regex: "pacemaker-[\\d\\.-]+"
      group: 0
    - name: corosync_version
      regex: "corosync-[\\d\\.-]+"
      group: 0
    # Modern ANGI package (RHEL 9+, unified Scale-Up/Scale-Out)
    - name: sap_hana_ha_version
      regex: "sap-hana-ha-[\\d\\.-]+"
      group: 0
    # Classic Scale-Up package
    - name: resource_agents_sap_hana
      regex: "resource-agents-sap-hana-[\\d][\\d\\.-]+"
      group: 0
    # Classic Scale-Out package
    - name: resource_agents_sap_hana_scaleout
      regex: "resource-agents-sap-hana-scaleout-[\\d\\.-]+"
      group: 0
    # SAPHanaSR package (legacy detection)
    - name: saphanasr_version
      regex: "SAPHanaSR[\\d\\.-]*"
      group: 0

validation_logic:
  scope: all_nodes_equal  # Package versions must match across all nodes
  # Majority maker may have different SAP HANA packages (or none) - this is a WARNING
  # HANA nodes having different packages from each other is more concerning
  compare_keys:
    - pacemaker_version
    - corosync_version
    - sap_hana_ha_version
    - resource_agents_sap_hana
    - resource_agents_sap_hana_scaleout
    - saphanasr_version
  expectations:
    - key: pacemaker_version
      operator: exists
      value: true
      message: "Pacemaker package not found"
    - key: corosync_version
      operator: exists
      value: true
      message: "Corosync package not found"
