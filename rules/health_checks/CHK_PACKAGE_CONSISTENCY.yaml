# CHK_PACKAGE_CONSISTENCY - Verify package versions across nodes
check_id: CHK_PACKAGE_CONSISTENCY
version: "1.2"
severity: WARNING
description: Verify package versions are consistent across nodes
enabled: true

# Package types:
# - sap-hana-ha: Modern ANGI package (RHEL 9+), supports both Scale-Up and Scale-Out
# - resource-agents-sap-hana: Classic Scale-Up package
# - resource-agents-sap-hana-scaleout: Classic Scale-Out package
# - SAPHanaSR: SUSE package for SAP HANA System Replication
#
# Majority maker nodes in Scale-Out clusters:
# - Should have SAME packages as HANA nodes, OR
# - Should have NO SAP HANA packages (no sap-hana-ha, resource-agents-sap-hana*)
# - Having different SAP HANA packages is a WARNING (not critical)

source_definitions:
  live_cmd: "rpm -qa | grep -E 'pacemaker|corosync|resource-agents|SAPHanaSR|sap-hana-ha' | sort 2>/dev/null || dpkg -l | grep -E 'pacemaker|corosync' 2>/dev/null"
  sos_path: "sos_commands/rpm/package-data"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: pacemaker_version
      regex: "pacemaker-[\\d\\.-]+"
      group: 0
    - name: corosync_version
      regex: "corosync-[\\d\\.-]+"
      group: 0
    # Modern ANGI package (RHEL 9+, unified Scale-Up/Scale-Out)
    - name: sap_hana_ha_version
      regex: "sap-hana-ha-[\\d\\.-]+"
      group: 0
    # Classic Scale-Up package
    - name: resource_agents_sap_hana
      regex: "resource-agents-sap-hana-[\\d][\\d\\.-]+"
      group: 0
    # Classic Scale-Out package
    - name: resource_agents_sap_hana_scaleout
      regex: "resource-agents-sap-hana-scaleout-[\\d\\.-]+"
      group: 0
    # SUSE SAPHanaSR package
    - name: saphanasr_version
      regex: "SAPHanaSR[\\d\\.-]*"
      group: 0

validation_logic:
  scope: all_nodes_equal  # Package versions must match across all nodes
  # Majority maker may have different SAP HANA packages (or none) - this is a WARNING
  # HANA nodes having different packages from each other is more concerning
  compare_keys:
    - pacemaker_version
    - corosync_version
    - sap_hana_ha_version
    - resource_agents_sap_hana
    - resource_agents_sap_hana_scaleout
    - saphanasr_version
  expectations:
    - key: pacemaker_version
      operator: exists
      value: true
      message: "Pacemaker package not found"
    - key: corosync_version
      operator: exists
      value: true
      message: "Corosync package not found"
