# CHK_REPLICATION_MODE - Verify replication mode is synchronous
check_id: CHK_REPLICATION_MODE
version: "1.0"
severity: WARNING
description: Verify HANA replication mode is sync or syncmem
enabled: true

source_definitions:
  live_cmd: "crm_mon -A1 2>/dev/null | grep -iE 'sync|async|srmode' || timeout 10 SAPHanaSR-showAttr 2>/dev/null | grep -iE 'srmode|op_mode'"
  sos_path: "sos_commands/sap/SAPHanaSR-showAttr"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: sync_mode
      regex: "(sync|syncmem)"
      group: 0
    - name: async_mode
      regex: "(async)"
      group: 0

validation_logic:
  scope: cluster  # SR mode is cluster-wide
  expectations:
    - key: async_mode
      operator: not_exists
      value: true
      message: "Replication mode is async - data loss possible on failover"
