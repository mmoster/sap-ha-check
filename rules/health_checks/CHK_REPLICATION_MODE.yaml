# CHK_REPLICATION_MODE - Verify replication mode is synchronous
#
# Allowed modes for HA clusters:
#   - sync: Most secure. Primary waits until secondary has persisted log data to disk.
#           Zero data loss guaranteed, but higher latency.
#   - syncmem: Faster. Primary waits until secondary has received log data in memory.
#              Very low risk of data loss, better performance than sync.
#
# Not allowed:
#   - async: Data loss possible on failover. Not supported for HA clusters.
#
# Command availability:
#   - SAPHanaSR-showAttr: Available with Scale-Out packages:
#       - sap-hana-ha (ANGI, modern)
#       - resource-agents-sap-hana-scaleout (classic Scale-Out)
#   - crm_mon -A1: Available with all packages, shows cluster attributes
#       - Used as fallback for resource-agents-sap-hana (classic Scale-Up)
#         which does NOT include SAPHanaSR-showAttr
#
check_id: CHK_REPLICATION_MODE
version: "1.2"
severity: WARNING
description: Verify HANA replication mode is sync or syncmem (async not allowed for HA)
enabled: true

source_definitions:
  # Try SAPHanaSR-showAttr (sap-hana-ha/ANGI), fallback to crm_mon (classic resource-agents)
  live_cmd: "SAPHanaSR-showAttr 2>/dev/null | grep -iE 'srmode|syncmem|sync|async' || crm_mon -A1 2>/dev/null | grep -iE 'srmode|syncmem|sync|async'"
  sos_path: "sos_commands/sap/SAPHanaSR-showAttr"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: sync_mode
      regex: "\\bsync\\b"
      group: 0
    - name: syncmem_mode
      regex: "\\bsyncmem\\b"
      group: 0
    - name: async_mode
      regex: "\\basync\\b"
      group: 0

validation_logic:
  scope: cluster  # SR mode is cluster-wide
  match_mode: all
  expectations:
    - key: async_mode
      operator: not_exists
      value: true
      severity: CRITICAL
      message: "Replication mode is ASYNC - NOT SUPPORTED for HA! Data loss possible on failover. Use sync or syncmem instead."
    - key: syncmem_mode
      operator: info_if_exists
      pass_message: "Replication mode is syncmem (faster). Primary waits until secondary receives log data in memory. For maximum security, consider sync mode where primary waits until secondary persists to disk."
