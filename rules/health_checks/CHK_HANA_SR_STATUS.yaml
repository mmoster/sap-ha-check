# CHK_HANA_SR_STATUS - Verify HANA System Replication status
check_id: CHK_HANA_SR_STATUS
version: "1.0"
severity: CRITICAL
description: Verify HANA System Replication status is healthy
enabled: true

source_definitions:
  live_cmd: "pcs status 2>/dev/null | grep -iE 'SAPHana|Masters|Slaves|Started' || crm_mon -1 2>/dev/null | grep -iE 'SAPHana|Masters|Slaves'"
  sos_path: "sos_commands/pacemaker/crm_mon_-1"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: hana_master
      regex: "(Masters:|Master:)\\s*\\[\\s*(\\w+)"
      group: 0
    - name: hana_slave
      regex: "(Slaves:|Slave:)\\s*\\[\\s*(\\w+)"
      group: 0
    - name: hana_started
      regex: "SAPHana.*Started"
      group: 0
    - name: sr_error
      regex: "(SFAIL|Failed|Stopped|UNKNOWN)"
      group: 0

validation_logic:
  scope: cluster  # SR status is cluster-wide
  expectations:
    - key: sr_error
      operator: not_exists
      value: true
      message: "HANA System Replication reports errors"
    - key: hana_master
      operator: exists
      value: true
      message: "No HANA master found - System Replication may not be active"
