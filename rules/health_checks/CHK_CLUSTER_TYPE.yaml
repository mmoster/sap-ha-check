# CHK_CLUSTER_TYPE - Detect SAP HANA HA configuration type
check_id: CHK_CLUSTER_TYPE
version: "2.1"
severity: INFO
description: Detect SAP HANA HA cluster configuration (Scale-Up vs Scale-Out)
enabled: true

# Scale-Up: 2 HANA instances (1 per site), uses SAPHana or SAPHanaController with clone-max=2
# Scale-Out: 4+ HANA instances (2+ per site), uses SAPHanaController with clone-max=4+, has majority maker
#
# Key insight: SAPHanaController can be used for BOTH Scale-Up and Scale-Out
# The clone-max value tells us how many HANA nodes are in the cluster
# hdbnsutil -sr_state validates actual HANA topology (2+ hosts per site = Scale-Out)

source_definitions:
  live_cmd: |
    echo "=== NODES ===" && crm_node -l 2>/dev/null | wc -l && crm_node -l 2>/dev/null;
    echo "=== HANA_RESOURCES ===" && pcs resource show 2>/dev/null | grep -E 'SAPHana|SAPHanaController|SAPHanaTopology' || crm_mon -1 2>/dev/null | grep -E 'SAPHana|SAPHanaController' || cat /var/lib/pacemaker/cib/cib.xml 2>/dev/null | grep -oE 'SAPHana[^"]*' | head -1;
    echo "=== CLONE_MAX ===" && (pcs resource config 2>/dev/null | grep -A10 'SAPHanaController\|SAPHana_' | grep -E 'clone-max' | head -1 || cat /var/lib/pacemaker/cib/cib.xml 2>/dev/null | grep -oE 'clone-max.*value="[0-9]+"' | grep -oE '[0-9]+' | head -1 | sed 's/^/clone-max=/') || echo "clone-max=2";
    echo "=== MAJORITY_MAKER ===";
    # Detect majority maker by: 1) name pattern, 2) location constraints excluding BOTH SAPHanaTopology AND SAPHanaController
    # A node is a majority maker ONLY if BOTH resources are excluded from it (not just app servers)
    MM_BY_NAME=$(crm_node -l 2>/dev/null | grep -iE 'majority|mm-' | awk '{print $2}');
    # Use 'pcs constraint location config' (pcs 0.12+) or 'pcs constraint location show' (older)
    MM_CONSTRAINT_OUTPUT=$(pcs constraint location config 2>/dev/null || pcs constraint location show 2>/dev/null);
    MM_CONTROLLER=$(echo "$MM_CONSTRAINT_OUTPUT" | grep -E "SAPHanaController.*avoids node.*INFINITY" | sed "s/.*avoids node '\([^']*\)'.*/\1/" | sort -u);
    MM_TOPOLOGY=$(echo "$MM_CONSTRAINT_OUTPUT" | grep -E "SAPHanaTopology.*avoids node.*INFINITY" | sed "s/.*avoids node '\([^']*\)'.*/\1/" | sort -u);
    MM_BY_CONSTRAINT="";
    for node in $MM_CONTROLLER; do
      if echo "$MM_TOPOLOGY" | grep -qx "$node"; then
        MM_BY_CONSTRAINT="$node";
        break;
      fi;
    done;
    if [ -n "$MM_BY_NAME" ]; then
      echo "majority_maker_node=$MM_BY_NAME (by name)";
    elif [ -n "$MM_BY_CONSTRAINT" ]; then
      echo "majority_maker_node=$MM_BY_CONSTRAINT (by constraint)";
    else
      echo "none";
    fi
    echo "=== HDBNSUTIL_SR_STATE ===";
    # Get HANA sidadm user - derive from /usr/sap/*/HDB* directory (most reliable)
    # This correctly handles multi-SID setups where DB SID differs from app SID
    SIDADM="";
    SID=$(ls -d /usr/sap/*/HDB[0-9][0-9] 2>/dev/null | head -1 | cut -d/ -f4);
    if [ -n "$SID" ]; then
      SIDADM=$(echo "$SID" | tr '[:upper:]' '[:lower:]')adm;
    fi
    if [ -z "$SIDADM" ]; then
      # Fallback: find sidadm user from /etc/passwd whose SID has an HDB directory
      for CANDIDATE in $(grep -E '^[a-z0-9]{3}adm:.*:/usr/sap/[A-Z0-9]{3}/home:' /etc/passwd 2>/dev/null | cut -d: -f1); do
        CAND_SID=$(echo "$CANDIDATE" | sed 's/adm$//' | tr '[:lower:]' '[:upper:]');
        if ls -d "/usr/sap/$CAND_SID/HDB"[0-9][0-9] >/dev/null 2>&1; then
          SIDADM="$CANDIDATE";
          break;
        fi;
      done;
      # Last resort: take the first sidadm user
      if [ -z "$SIDADM" ]; then
        SIDADM=$(grep -E '^[a-z0-9]{3}adm:.*:/usr/sap/[A-Z0-9]{3}/home:' /etc/passwd 2>/dev/null | head -1 | cut -d: -f1);
      fi
    fi
    if [ -n "$SIDADM" ] && id "$SIDADM" >/dev/null 2>&1; then
      echo "sidadm_user=$SIDADM";
      # Run hdbnsutil -sr_state as sidadm to get HANA topology
      # Count hosts per site from Host Mappings section
      SR_OUTPUT=$(su - "$SIDADM" -c "hdbnsutil -sr_state" 2>/dev/null);
      if [ -n "$SR_OUTPUT" ]; then
        echo "$SR_OUTPUT";
        # Count unique hosts per site from "hostname -> [SITE] target" lines
        # Scale-Out: multiple hosts map to same site; Scale-Up: one host per site
        echo "=== HOSTS_PER_SITE ===";
        echo "$SR_OUTPUT" | grep -E '^\S+\s+->\s+\[' | sed 's/.*\[\([^]]*\)\].*/\1/' | sort | uniq -c | awk '{print "site_" $2 "_hosts=" $1}';
      else
        echo "hdbnsutil_failed";
      fi
    else
      echo "no_sidadm_user";
    fi
  sos_cmd: |
    echo "=== NODES ===";
    pcs -f {file} status nodes 2>/dev/null;
    echo "=== HANA_RESOURCES ===";
    pcs -f {file} resource status 2>/dev/null | grep -E 'SAPHana|SAPHanaController|SAPHanaTopology' || pcs -f {file} resource show 2>/dev/null | grep -E 'SAPHana|SAPHanaController|SAPHanaTopology';
    echo "=== CLONE_MAX ===";
    pcs -f {file} resource config 2>/dev/null | grep -A10 'SAPHanaController\|SAPHana_' | grep -E 'clone-max' | head -1 || echo "clone-max=2";
    echo "=== MAJORITY_MAKER ===";
    # Detect majority maker by location constraints excluding SAPHanaTopology AND SAPHanaController
    # A node is a majority maker ONLY if BOTH resources are excluded from it
    # Use 'pcs constraint location config' (pcs 0.12+) or 'pcs constraint location show' (older)
    MM_CONSTRAINT_OUTPUT=$(pcs -f {file} constraint location config 2>/dev/null || pcs -f {file} constraint location show 2>/dev/null);
    # Find nodes where SAPHanaController is excluded
    MM_CONTROLLER=$(echo "$MM_CONSTRAINT_OUTPUT" | grep -E "SAPHanaController.*avoids node.*INFINITY" | sed "s/.*avoids node '\([^']*\)'.*/\1/" | sort -u);
    # Find nodes where SAPHanaTopology is excluded
    MM_TOPOLOGY=$(echo "$MM_CONSTRAINT_OUTPUT" | grep -E "SAPHanaTopology.*avoids node.*INFINITY" | sed "s/.*avoids node '\([^']*\)'.*/\1/" | sort -u);
    # Majority maker = node that appears in BOTH lists (has constraints for both resources)
    MM="";
    for node in $MM_CONTROLLER; do
      if echo "$MM_TOPOLOGY" | grep -qx "$node"; then
        MM="$node";
        break;
      fi;
    done;
    if [ -n "$MM" ]; then echo "majority_maker_node=$MM (by constraint)"; else echo "none"; fi
  sos_cmd_file: "sos_commands/pacemaker/crm_report/*/cib.xml"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: node_count
      regex: "=== NODES ===\\s*(\\d+)"
      group: 1
    - name: node_list
      regex: "\\d+\\s+(\\S+)\\s+(member|lost)"
      group: 0
    - name: saphana_resource
      regex: "(SAPHana_\\S+)"
      group: 1
    - name: saphana_controller
      regex: "(SAPHanaController_\\S+)"
      group: 1
    - name: saphana_topology
      regex: "(SAPHanaTopology\\S*)"
      group: 1
    - name: clone_max
      regex: "clone-max[=:\"].*?(\\d+)"
      group: 1
    - name: majority_maker
      regex: "(majority|qdevice|Majority)"
      group: 0
    - name: majority_maker_node
      # Captures "majority_maker_node=<hostname>" from detection output
      regex: "majority_maker_node=(\\S+)"
      group: 1
    # Parse hdbnsutil -sr_state output for host count per site
    # site_<NAME>_hosts=<count> from HOSTS_PER_SITE section
    - name: site_hosts_count
      # Matches "site_DC1_hosts=1" or "site_DC2_hosts=2" - value > 1 means Scale-Out
      regex: "site_\\w+_hosts=(\\d+)"
      group: 1
    - name: sidadm_user
      regex: "sidadm_user=(\\S+)"
      group: 1
    - name: hdbnsutil_failed
      regex: "(hdbnsutil_failed|no_sidadm_user)"
      group: 1

validation_logic:
  scope: cluster  # Cluster-wide detection, only needs one node
  type: detection  # This is a detection check, not pass/fail
  expectations: []
  # No expectations - this is informational
  # The engine will determine cluster type based on parsed values
