# CHK_HANA_INSTALLED - Check if SAP HANA is installed
check_id: CHK_HANA_INSTALLED
version: "1.3"
severity: INFO
description: Check if SAP HANA database is installed on this node
enabled: true

source_definitions:
  # Check for HANA-specific indicators that prove local HANA installation:
  # 1. /usr/sap/<SID>/HDB<instance> directory structure (local HANA installation)
  # 2. Running HANA processes (hdbdaemon, hdbnameserver, hdbindexserver)
  # 3. <sid>adm user with HDB home directory in /etc/passwd
  # NOTE: Do NOT check /hana/shared - it's often NFS-mounted and doesn't prove local installation
  #       (e.g., majority maker nodes mount /hana/shared but don't run HANA)
  live_cmd: |
    # Method 1: Check for HANA instance directories /usr/sap/<SID>/HDB<NN>
    if ls -d /usr/sap/*/HDB[0-9][0-9] 2>/dev/null | head -1 | grep -q .; then
      echo 'HANA_FOUND'
    # Method 2: Check for running HANA processes
    elif ps -ef 2>/dev/null | grep -E 'hdbdaemon|hdbnameserver|hdbindexserver' | grep -v grep | head -1 | grep -q .; then
      echo 'HANA_FOUND'
    # Method 3: Check for <sid>adm users with HDB home directory
    elif grep -E '^[a-z]{3}adm:.*HDB' /etc/passwd 2>/dev/null | head -1 | grep -q .; then
      echo 'HANA_FOUND'
    # Method 4: Check for sapcontrol with HANA instance (local executable)
    elif ls /usr/sap/*/HDB*/exe/sapcontrol 2>/dev/null | head -1 | grep -q .; then
      echo 'HANA_FOUND'
    else
      echo 'HANA_NOT_FOUND'
    fi
  # SOSreport: check ps output for HANA processes (hdbnameserver, hdbdaemon, etc.)
  # The 'ps' file in sosreport contains full process list
  sos_path: "ps"

parser:
  type: regex
  multiline: true
  search_patterns:
    # For live_cmd: look for explicit status
    - name: hana_status
      regex: "(HANA_FOUND|HANA_NOT_FOUND)"
      group: 1
    # For sosreport ps file: look for HANA processes
    - name: hana_process
      regex: "(hdbnameserver|hdbdaemon|hdbindexserver|hdbcompileserver|hdbpreprocessor)"
      group: 1

validation_logic:
  scope: node
  # Pass if either explicit HANA_FOUND status OR HANA processes found
  expectations:
    - key: hana_status
      operator: eq
      value: "HANA_FOUND"
      message: "SAP HANA database not installed on this node"
    - key: hana_process
      operator: exists
      message: "No HANA processes found"
  match_mode: any  # Pass if ANY expectation matches
