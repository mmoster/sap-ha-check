# CHK_HANA_INSTALLED - Check if SAP HANA is installed
check_id: CHK_HANA_INSTALLED
version: "1.0"
severity: INFO
description: Check if SAP HANA is installed on this node
enabled: true

source_definitions:
  # Use explicit check that returns FOUND or NOT_FOUND
  live_cmd: "if ls -d /usr/sap/*/HDB* /hana/shared/*/HDB* 2>/dev/null | head -1 | grep -q .; then echo 'HANA_FOUND'; else echo 'HANA_NOT_FOUND'; fi"
  sos_path: "sos_commands/sap/sap_discovery"

parser:
  type: regex
  multiline: false
  search_patterns:
    - name: hana_status
      regex: "(HANA_FOUND|HANA_NOT_FOUND)"
      group: 1

validation_logic:
  scope: node
  expectations:
    - key: hana_status
      operator: eq
      value: "HANA_FOUND"
      message: "SAP HANA not installed on this node"
