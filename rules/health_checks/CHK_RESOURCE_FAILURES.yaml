# CHK_RESOURCE_FAILURES - Detect failed resource operations
check_id: CHK_RESOURCE_FAILURES
version: "1.0"
severity: WARNING
description: Detect failed resource operations in cluster history
enabled: true

source_definitions:
  # Check for failed actions - if none found, output NO_FAILURES
  live_cmd: |
    FAILURES=$(crm_mon -1 -f 2>/dev/null | grep -iE 'FAILED|fail-count=[1-9]|Failed Actions' || pcs status --full 2>/dev/null | grep -iE 'FAILED|fail-count=[1-9]|Failed Actions')
    if [ -n "$FAILURES" ]; then
      echo "$FAILURES"
    else
      echo "NO_FAILURES"
    fi
  sos_path: "sos_commands/pacemaker/crm_mon_-1*"
  # Fallback: run pcs -f cib.xml locally when cluster was stopped
  sos_cmd: "pcs -f {file} status --full 2>/dev/null | grep -iE 'FAILED|fail-count=[1-9]|Failed Actions' || echo 'NO_FAILURES'"
  sos_cmd_file: "sos_commands/pacemaker/crm_report/*/cib.xml"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: status
      regex: "(NO_FAILURES|FAILED|fail-count=[1-9]|Failed Actions)"
      group: 0

validation_logic:
  scope: cluster  # Failure history is cluster-wide
  expectations:
    - key: status
      operator: eq
      value: "NO_FAILURES"
      message: "Failed resource actions detected - may need cleanup with: pcs resource cleanup"
