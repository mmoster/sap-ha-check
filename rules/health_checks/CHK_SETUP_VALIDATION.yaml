# CHK_SETUP_VALIDATION - Validate against SAP HANA HA best practices
check_id: CHK_SETUP_VALIDATION
version: "1.0"
severity: CRITICAL
description: Validate cluster setup against SAP HANA HA best practices
enabled: true

source_definitions:
  # Validate cluster setup using pcs (RHEL)
  live_cmd: |
    echo "=== CLUSTER PROPERTIES ==="
    pcs property show 2>/dev/null
    echo "=== RESOURCE DEFAULTS ==="
    pcs resource defaults 2>/dev/null
    echo "=== OPERATION DEFAULTS ==="
    pcs resource op defaults 2>/dev/null
  sos_path: "sos_commands/pacemaker/pcs_config"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: maintenance_mode
      regex: "maintenance[_-]mode.*true"
      group: 0
    - name: stonith_action
      regex: "(stonith-action=reboot|pcmk_reboot_action)"
      group: 0
    - name: resource_stickiness
      regex: "(resource-stickiness|rsc_defaults.*stickiness)"
      group: 0
    - name: migration_threshold
      regex: "(migration-threshold|meta.*migration)"
      group: 0

validation_logic:
  scope: cluster  # Setup validation is cluster-wide
  expectations:
    - key: maintenance_mode
      operator: not_exists
      value: true
      message: "Cluster is in maintenance mode"
