# CHK_HADR_HOOKS - Architecture-aware HA/DR provider hook validation
#
# Validates that SAP HANA HA/DR provider hooks are correctly configured
# for the detected architecture (RHEL version, topology, resource agent type).
#
# Checks: global.ini sections, sudoers, trace settings, provider files.
# Provides actionable remediation suggestions for every finding.
#
# Requires: SSH or local access (skipped for SOSreport -- insufficient data).
# Depends on: CHK_CLUSTER_TYPE, CHK_PACKAGE_CONSISTENCY, CHK_HANA_INSTALLED
#
check_id: CHK_HADR_HOOKS
version: "2.0"
severity: CRITICAL
description: Validate SAP HANA HA/DR provider hooks configuration (architecture-aware)
enabled: true
hana_nodes_only: true  # Skip majority maker nodes (no HANA installed)

source_definitions:
  # Collect global.ini + sudoers + provider files + packages + RHEL version
  # in a single command.  Section markers allow the parser to split the output.
  live_cmd: >-
    echo '=== GLOBAL_INI ===';
    cat /hana/shared/*/global/hdb/custom/config/global.ini 2>/dev/null
    || cat /usr/sap/*/SYS/global/hdb/custom/config/global.ini 2>/dev/null;
    echo '=== SUDOERS ===';
    cat /etc/sudoers.d/20-saphana /etc/sudoers.d/*sap* /etc/sudoers.d/*hana* 2>/dev/null;
    echo '=== PROVIDER_FILES ===';
    ls /usr/share/sap-hana-ha/HanaSR.py /usr/share/SAPHanaSR/SAPHanaSR.py 2>&1;
    echo '=== PACKAGES ===';
    rpm -q sap-hana-ha resource-agents-sap-hana resource-agents-sap-hana-scaleout 2>/dev/null;
    echo '=== RHEL ===';
    cat /etc/redhat-release 2>/dev/null
  # No sos_path: this check requires live access (SSH/local).
  # SOSreports lack sudoers, provider files, and may lack global.ini.

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: raw_output
      regex: "([\\s\\S]*)"
      group: 0

validation_logic:
  scope: per_node
  custom_check: hadr_hooks_validation
