# CHK_HADR_HOOKS - Validate HA/DR provider hooks
check_id: CHK_HADR_HOOKS
version: "1.0"
severity: CRITICAL
description: Validate SAP HANA HA/DR provider hooks are configured
enabled: true

source_definitions:
  # Check for HA/DR hooks - supports various provider names
  # SAPHanaSR: Standard hook for RHEL (sap-hana-ha package)
  # ChkSrv/susChkSrv: Additional check hook
  # susTkOver: Takeover hook
  live_cmd: "grep -riE 'ha_dr_provider|provider.*=.*(HanaSR|SAPHanaSR|ChkSrv|susTkOver|susChkSrv)' /hana/shared/*/global/hdb/custom/config/global.ini 2>/dev/null || grep -riE 'ha_dr_provider|provider' /usr/sap/*/SYS/global/hdb/custom/config/global.ini 2>/dev/null"
  sos_path: "hana/shared/global/hdb/custom/config/global.ini"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: hadr_provider
      regex: "(ha_dr_provider|provider.*=.*(HanaSR|SAPHanaSR|ChkSrv|susTkOver|susChkSrv))"
      group: 0
    - name: provider_hook
      regex: "(HanaSR|SAPHanaSR|ChkSrv|susTkOver|susChkSrv)"
      group: 0

validation_logic:
  scope: per_node  # Hooks must be configured on each node
  expectations:
    - key: hadr_provider
      operator: exists
      value: true
      message: "HA/DR provider hooks not configured - cluster may not react to HANA events"
