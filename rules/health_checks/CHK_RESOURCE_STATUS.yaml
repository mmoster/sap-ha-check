# CHK_RESOURCE_STATUS - Verify SAP HANA resources are running
#
# Detects resource states:
#   - running: Resource is active with Master/Slave or Promoted/Unpromoted roles
#   - stopped: Resource is stopped (may be due to failure or manual stop)
#   - disabled: Resource is intentionally disabled (target-role=Stopped)
#   - unmanaged: Resource is set to unmanaged (is-managed=false)
#   - absent: No SAP HANA resource found in cluster
#
# Downstream checks (CHK_MASTER_SLAVE_ROLES, CHK_SITE_ROLES, CHK_HANA_SR_STATUS)
# depend on this check passing to avoid misleading failures when resources are
# intentionally stopped during maintenance.
#
check_id: CHK_RESOURCE_STATUS
version: "2.0"
severity: CRITICAL
description: Verify SAP HANA cluster resources are running
enabled: true

source_definitions:
  live_cmd: |
    OUTPUT=$(crm_mon -1 -r 2>/dev/null || pcs status resources 2>/dev/null)
    echo "$OUTPUT"
    # Emit resource state summary for downstream checks
    # IMPORTANT: Only check HANA resource lines, not the full output.
    # Other resources (ERS, AAS groups) may be disabled without affecting HANA.
    # Extract HANA resource lines AND their child status lines (Masters/Slaves/Started/Stopped)
    # Use grep -A2 to capture the 2 lines after each SAPHana match (clone children)
    HANA_LINES=$(echo "$OUTPUT" | grep -iE -A2 'SAPHana|SAPHanaController|rsc_SAPHana')
    if [ -n "$HANA_LINES" ]; then
      if echo "$HANA_LINES" | grep -qi 'unmanaged'; then
        echo "HANA_RESOURCE_STATE=unmanaged"
      elif echo "$HANA_LINES" | grep -qiE 'target-role.*Stopped|Stopped.*disabled|\(disabled\)'; then
        echo "HANA_RESOURCE_STATE=disabled"
      elif echo "$HANA_LINES" | grep -qiE 'Stopped|FAILED' && ! echo "$HANA_LINES" | grep -qiE 'Started|Master|Slave|Promoted|Unpromoted'; then
        echo "HANA_RESOURCE_STATE=stopped"
      elif echo "$HANA_LINES" | grep -qiE 'Started|Master|Slave|Promoted|Unpromoted'; then
        echo "HANA_RESOURCE_STATE=running"
      else
        echo "HANA_RESOURCE_STATE=unknown"
      fi
    else
      echo "HANA_RESOURCE_STATE=absent"
    fi
  sos_path: "sos_commands/pacemaker/crm_mon_-1*"
  # Fallback: run pcs -f cib.xml locally when cluster was stopped
  sos_cmd: "pcs -f {file} status resources 2>/dev/null"
  sos_cmd_file: "sos_commands/pacemaker/crm_report/*/cib.xml"

parser:
  type: regex
  multiline: true
  search_patterns:
    - name: sap_hana_resource
      regex: "(SAPHana|rsc_SAPHana|SAPHanaTopology)"
      group: 0
    - name: resource_stopped
      regex: "(Stopped|FAILED|stopped)"
      group: 0
    - name: resource_started
      regex: "(Started|Master|Slave|Promoted|running)"
      group: 0
    - name: resource_disabled
      regex: "(target-role.*Stopped|Stopped.*disabled|disabled)"
      group: 0
    - name: resource_unmanaged
      regex: "(unmanaged)"
      group: 0
    - name: hana_resource_state
      regex: "HANA_RESOURCE_STATE=(\\w+)"
      group: 1

validation_logic:
  scope: cluster  # Resource status is cluster-wide
  expectations:
    - key: sap_hana_resource
      operator: exists
      value: true
      message: "No SAP HANA resources found in cluster"
    - key: resource_started
      operator: exists
      value: true
      message: "SAP HANA resources are not running (resource may be stopped or disabled)"
    - key: resource_disabled
      operator: info_if_exists
      pass_message: "HANA resource is disabled in Pacemaker (target-role=Stopped or is-managed=false)"
    - key: resource_unmanaged
      operator: info_if_exists
      pass_message: "HANA resource is in unmanaged state"
