[tool.black]
line-length = 100
target-version = ["py36"]

[tool.pylint.main]
# Minimum Python version to use for version-dependent checks
py-version = "3.6"

[tool.pylint."messages control"]
disable = [
    # Black handles formatting — disable conflicting layout rules
    "line-too-long",           # C0301 - Black wraps lines
    # "bad-whitespace" removed - no longer exists in pylint

    # Too noisy for this codebase at this stage — will address in refactoring phase
    "too-many-arguments",       # R0913
    "too-many-positional-arguments", # R0917
    "too-many-locals",          # R0914
    "too-many-statements",      # R0915
    "too-many-branches",        # R0912
    "too-many-return-statements",# R0911
    "too-many-instance-attributes", # R0902
    "too-many-public-methods",  # R0904
    "too-many-nested-blocks",   # R1702
    "too-few-public-methods",   # R0903
    "too-many-lines",           # C0302

    # Docstring rules — not adding docstrings in the lint phase
    "missing-module-docstring",  # C0114
    "missing-class-docstring",   # C0115
    "missing-function-docstring",# C0116

    # Import errors — pylint doesn't resolve all package-internal imports
    "import-error",             # E0401

    # Broad exception catching is intentional at error boundaries (SSH, subprocess, YAML, file I/O)
    # Will narrow to specific types during refactoring phase where practical
    "broad-exception-caught",   # W0718

    # Acceptable patterns in this codebase
    "invalid-name",             # C0103 - many short variable names are fine (e.g., ip, fd)
    "global-statement",         # W0603 - used intentionally for spinner state
    "duplicate-code",           # R0801 - will address in refactoring phase
    "fixme",                    # W0511 - keep TODO/FIXME comments visible

    # Import-outside-toplevel is used intentionally for conditional/lazy imports
    "import-outside-toplevel",  # C0415
]

[tool.pylint.format]
max-line-length = 100

[tool.pylint.basic]
good-names = ["i", "j", "k", "e", "f", "fd", "ip", "ok", "rc", "fn", "db", "n", "s", "v", "x", "y", "_"]

[tool.pylint.similarities]
min-similarity-lines = 8

[tool.pytest.ini_options]
pythonpath = [".", "tool/sap_cluster_checks/lib"]
